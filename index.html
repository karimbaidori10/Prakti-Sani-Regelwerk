<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSMD Regelwerk</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:25px;
text-align:center;
background:#111827;
border-bottom:1px solid #1f2937;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.rule{
background:#111827;
padding:15px;
margin-bottom:10px;
border-radius:10px;
border-left:3px solid #38bdf8;
font-size:14px;
outline:none;
}

.rule[contenteditable="true"]{
outline:2px dashed #38bdf8;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.save{
background:#22c55e;
color:white;
}

.add{
background:#3b82f6;
color:white;
}
</style>
</head>

<body>

<header>
<h1>📘 LSMD Regelwerk</h1>
<p>Live Firebase Regelwerk System</p>
</header>

<div class="container">

<div id="rules"></div>

<button class="add" onclick="addRule()">+ Regel hinzufügen</button>
<button class="save" onclick="save()">💾 Speichern</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG (HIER 1:1 AUS FIREBASE EINTRAGEN) */
const firebaseConfig = {
  apiKey: "DEIN_VOLLSTÄNDIGER_KEY",
  authDomain: "lsmd-prakti-sani.firebaseapp.com",
  projectId: "lsmd-prakti-sani",
  storageBucket: "lsmd-prakti-sani.firebasestorage.app",
  messagingSenderId: "775818506431",
  appId: "DEINE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD */
async function loadRules(){

const snap = await getDocs(collection(db, "rules"));

let html = "";

snap.forEach((d)=>{
html += `
<div class="rule" contenteditable="true" data-id="${d.id}">
${d.data().text}
</div>
`;
});

document.getElementById("rules").innerHTML = html;

}

/* ADD */
window.addRule = function(){
document.getElementById("rules").innerHTML += `
<div class="rule" contenteditable="true">
Neue Regel...
</div>
`;
}

/* SAVE (STABIL FIX) */
window.save = async function(){

const rules = document.querySelectorAll(".rule");

for(const r of rules){

const text = r.innerText;
const id = r.getAttribute("data-id");

if(id){
await setDoc(doc(db,"rules",id),{text});
}else{
await addDoc(collection(db,"rules"),{text});
}

}

alert("Gespeichert!");
}

loadRules();

</script>

</body>
</html>
