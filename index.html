<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSMD • Prakti/Sani Regelwerk</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter, system-ui;
background:radial-gradient(circle at top, #0f172a, #0b1220);
color:white;
}

.topbar{
position:sticky;
top:0;
z-index:999;
background:rgba(15,23,42,0.85);
backdrop-filter:blur(12px);
border-bottom:1px solid #1f2937;
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;
}

.topbar button{
background:#111827;
border:1px solid #1f2937;
color:#cbd5e1;
padding:8px 12px;
border-radius:12px;
cursor:pointer;
font-size:13px;
transition:0.25s ease;
white-space:nowrap;
}

.topbar button:hover{
transform:translateY(-2px);
border-color:#38bdf8;
color:#38bdf8;
box-shadow:0 0 15px rgba(56,189,248,0.2);
}

.container{
max-width:1050px;
margin:auto;
padding:20px;
}

.section{
background:rgba(17,24,39,0.85);
backdrop-filter:blur(10px);
border-radius:16px;
margin-bottom:18px;
border:1px solid #1f2937;

opacity:0;
transform:translateY(25px);
transition:all 0.6s ease;
}

.section.show{
opacity:1;
transform:translateY(0);
}

.title{
padding:14px;
background:#1f2937;
font-weight:600;
cursor:pointer;
transition:0.2s ease;
}

.title:hover{
background:#273449;
}

.box{
background:#0b1220;
margin:12px;
padding:14px;
border-radius:12px;
border-left:4px solid #38bdf8;
line-height:1.6;
font-size:14px;
transition:0.2s ease;
}

.box:hover{
transform:scale(1.01);
box-shadow:0 0 20px rgba(56,189,248,0.08);
}

.warn{
background:#1f0f10;
margin:12px;
padding:14px;
border-radius:12px;
border-left:4px solid #ef4444;
}

.good{
background:#0f1f14;
margin:12px;
padding:14px;
border-radius:12px;
border-left:4px solid #22c55e;
}

.hidden{display:none;}

img{
width:100%;
border-radius:14px;
margin:12px;
transition:0.3s ease;
}

img:hover{
transform:scale(1.01);
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="go('s1')">§1–§6</button>
<button onclick="go('s7')">§7–§11</button>
<button onclick="go('s12')">§12</button>
<button onclick="go('s13')">§13–§14</button>
<button onclick="go('sdk')">Dienstkleidung</button>
</div>

<div class="container">

<div class="section show">
<div class="title">📘 LSMD • Prakti/Sani Regelwerk</div>
<div class="box">
Ausbilder-Regelwerk • Internal System • MEDICAL DASHBOARD • ONLINE
</div>
</div>

<!-- DEINE INHALTE BLEIBEN 1:1 WIE BEI DIR -->
<!-- (nicht verändert) -->

</div>

<script>
function go(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function toggle(el){
el.nextElementSibling.classList.toggle("hidden");
}

const sections=document.querySelectorAll(".section");

const obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
}
});
},{threshold:0.1});

sections.forEach(s=>obs.observe(s));
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDhY81g8Y0Pr2J5gudELmDyHpGAhlA-eB0",
authDomain: "lsmd-prakti-sani.firebaseapp.com",
projectId: "lsmd-prakti-sani",
storageBucket: "lsmd-prakti-sani.firebasestorage.app",
messagingSenderId: "775818506431",
appId: "1:775818506431:web:96db21a0baa8f29fc3560a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

/* 👑 ONLY YOU */
const ADMIN_UID = "tnha6Wg5N5UcFVqlL9XQjczbW6C3";

let editingEnabled = false;

/* LOGIN BUTTON */
const loginBtn = document.createElement("button");
loginBtn.innerHTML = "🔐 Admin Login";

loginBtn.style.position = "fixed";
loginBtn.style.bottom = "20px";
loginBtn.style.right = "20px";
loginBtn.style.zIndex = "9999";
loginBtn.style.background = "#38bdf8";
loginBtn.style.color = "white";
loginBtn.style.border = "none";
loginBtn.style.padding = "12px 16px";
loginBtn.style.borderRadius = "12px";
loginBtn.style.cursor = "pointer";
loginBtn.style.fontWeight = "600";

document.body.appendChild(loginBtn);

loginBtn.onclick = async () => {
await signInWithPopup(auth, provider);
};

/* AUTH CHECK (HART GESICHERT) */
onAuthStateChanged(auth, (user) => {
if (!user) return;

if (user.uid === ADMIN_UID) {
enableEditing();
} else {
disableEditing();
}
});

/* ENABLE EDIT */
function enableEditing() {
if (editingEnabled) return;
editingEnabled = true;

document.querySelectorAll(".box").forEach((box) => {
box.contentEditable = true;
box.style.outline = "2px solid #38bdf8";

box.oninput = async () => {
if (!auth.currentUser || auth.currentUser.uid !== ADMIN_UID) return;

await setDoc(doc(db, "rules", "main"), {
html: document.querySelector(".container").innerHTML
});
};
});
}

/* ❌ DISABLE EDIT (WICHTIG) */
function disableEditing() {
editingEnabled = false;

document.querySelectorAll(".box").forEach((box) => {
box.contentEditable = false;
box.style.outline = "none";
box.oninput = null;
});
}

/* LIVE LOAD */
onSnapshot(doc(db, "rules", "main"), (snap) => {
if (!snap.exists()) return;

const data = snap.data();
if (!data.html) return;

document.querySelector(".container").innerHTML = data.html;

/* Admin nach Reload wieder aktiv */
editingEnabled = false;

onAuthStateChanged(auth, (user) => {
if (user && user.uid === ADMIN_UID) {
setTimeout(() => enableEditing(), 200);
}
});
});

</script>

</body>
</html>
