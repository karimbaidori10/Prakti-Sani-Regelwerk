<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSMD • Prakti/Sani Wiki</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b1220;
color:white;
overflow-x:hidden;
}

/* HEADER */
header{
text-align:center;
padding:30px 20px;
background:linear-gradient(135deg,#111827,#0b1220);
border-bottom:1px solid #1f2937;
animation:fadeDown 0.8s ease;
}

header img{
width:85px;
margin-bottom:10px;
filter:drop-shadow(0 0 10px #38bdf8);
}

header h1{
margin:5px 0;
font-size:22px;
letter-spacing:1px;
}

header p{
opacity:0.7;
font-size:13px;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* SECTION CARD */
.section{
background:rgba(17,24,39,0.85);
backdrop-filter: blur(10px);
border:1px solid #1f2937;
border-radius:14px;
margin-bottom:16px;
overflow:hidden;
transform:translateY(20px);
opacity:0;
animation:fadeUp 0.6s ease forwards;
transition:0.3s;
}

.section:hover{
transform:scale(1.01);
border-color:#38bdf8;
}

/* TITLE */
.title{
padding:14px;
background:rgba(31,41,55,0.8);
font-weight:bold;
font-size:14px;
cursor:pointer;
position:relative;
}

.title::after{
content:"▼";
position:absolute;
right:15px;
transition:0.3s;
opacity:0.6;
}

/* CONTENT */
.content{
padding:15px;
font-size:14px;
line-height:1.7;
color:#e5e7eb;

/* smooth collapse */
max-height:1000px;
overflow:hidden;
transition:max-height 0.5s ease, opacity 0.3s ease;
opacity:1;
}

/* COLLAPSED */
.section.closed .content{
max-height:0;
opacity:0;
padding-top:0;
padding-bottom:0;
}

/* rotate arrow */
.section.closed .title::after{
transform:rotate(-90deg);
}

/* RULE */
.rule{
background:#0b1220;
padding:10px;
margin:8px 0;
border-left:3px solid #38bdf8;
border-radius:6px;
transition:0.25s;
cursor:default;
}

.rule:hover{
transform:translateX(5px);
background:#0f172a;
border-left-color:#60a5fa;
}

/* IMAGE */
img{
width:100%;
max-width:450px;
border-radius:10px;
margin-top:10px;
border:1px solid #1f2937;
box-shadow:0 0 15px rgba(56,189,248,0.15);
}

/* ANIMATIONS */
@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

@keyframes fadeDown{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1; transform:translateY(0);}
}

/* stagger effect */
.section:nth-child(1){animation-delay:0.05s}
.section:nth-child(2){animation-delay:0.1s}
.section:nth-child(3){animation-delay:0.15s}
.section:nth-child(4){animation-delay:0.2s}
.section:nth-child(5){animation-delay:0.25s}
.section:nth-child(6){animation-delay:0.3s}
.section:nth-child(7){animation-delay:0.35s}
.section:nth-child(8){animation-delay:0.4s}

/* SMALL */
.small{
opacity:0.7;
font-size:12px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<img src="assets/md-logo.png">
<h1>LSMD • Prakti/Sani</h1>
<p>Medical Department • Internal Wiki System • Online</p>
</header>

<div class="container">

<div id="app"></div>

</div>

<script>

const sections = [
{
title:"📘 Regelwerk Prakti/Sani-Ausbilder – LSMD",
content:`Dieses Regelwerk dient der Sicherstellung von Qualität, Struktur und Professionalität innerhalb der Prakti/Sani Abteilung.`
},

{
title:"🛡 Allgemeine Regeln",
content:`
<div class="rule">§1 Vorbildfunktion</div>
<div class="rule">§2 Fachliche Kompetenz</div>
<div class="rule">§3 Teamarbeit</div>
<div class="rule">§4 Aktivitätspflicht (5 Punkte)</div>
<div class="rule">§5 Dienstkleidung Pflicht</div>
<div class="rule">§6 Wöchentliche Besprechung</div>
<div class="rule">§7 Werbung täglich</div>
`
},

{
title:"🔄 Kommunikation",
content:`<div class="rule">§8 Absprache ist Pflicht</div>`
},

{
title:"📋 Prüfungen & Einstellungen",
content:`
<div class="rule">§9 Prüfungen im Discord</div>
<div class="rule">§10 Max 2 Ausbilder</div>
<div class="rule">§11 Zeit vorher klären</div>
<div class="rule">§12 Blaues Blatt</div>
<div class="rule">§13 Fahrprüfung</div>
`
},

{
title:"🗂 Dokumentation",
content:`<div class="rule">§15 Dokumente intern halten</div>`
},

{
title:"💬 Motivation",
content:`<div class="rule">§16 Förderung neuer Mitglieder</div>`
},

{
title:"🧭 Struktur",
content:`<div class="rule">§18 Paten System</div>`
},

{
title:"⚠️ Warnsystem",
content:`<div class="rule">§20 3 Warns = Ausschluss</div>`
},

{
title:"👕 Dienstkleidung",
content:`
<div class="rule">Pflicht im Dienst</div>
<img src="assets/dienstkleidung.png">
<div class="small">Made by Karim Tranquile</div>
`
}
];

/* RENDER */
function render(){
let html="";

sections.forEach((s,i)=>{
html += `
<div class="section">
<div class="title" onclick="toggle(this)">${s.title}</div>
<div class="content">
${s.content}
</div>
</div>
`;
});

document.getElementById("app").innerHTML = html;
}

/* TOGGLE */
function toggle(el){
let section = el.parentElement;
section.classList.toggle("closed");
}

render();
</script>

</body>
</html>
