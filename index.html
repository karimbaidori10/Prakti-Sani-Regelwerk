<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSMD • Enterprise Medical System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
header{
text-align:center;
padding:25px;
background:#111827;
border-bottom:1px solid #1f2937;
}

header img{
width:80px;
margin-bottom:10px;
filter:drop-shadow(0 0 10px #38bdf8);
}

/* SEARCH */
.searchbar{
max-width:800px;
margin:15px auto;
display:flex;
gap:10px;
}

.searchbar input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
background:#111827;
color:white;
border:1px solid #1f2937;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* SECTION */
.section{
background:#111827;
border-radius:12px;
margin-bottom:15px;
overflow:hidden;
border:1px solid #1f2937;
}

.title{
padding:14px;
background:#1f2937;
font-weight:bold;
cursor:pointer;
}

.content{
padding:15px;
font-size:14px;
line-height:1.7;
}

/* RULE */
.rule{
background:#0b1220;
padding:12px;
margin:10px 0;
border-left:4px solid #38bdf8;
border-radius:6px;
font-weight:500;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.rule b{
color:#93c5fd;
}

/* EDIT */
.rule input{
flex:1;
background:transparent;
border:none;
color:white;
font-size:14px;
outline:none;
}

/* ADMIN ONLY BUTTON */
.admin-btn{
background:#22c55e;
color:white;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.hidden{
display:none;
}

/* HIGHLIGHT SEARCH */
.highlight{
background:#1f2937;
}

/* SMALL */
.small{
opacity:0.7;
font-size:12px;
}
</style>
</head>

<body>

<header>
<img src="assets/md-logo.png">
<h1>LSMD • Enterprise Medical System</h1>
<p>Live Wiki • Admin Panel • Firebase Sync</p>
</header>

<!-- SEARCH -->
<div class="searchbar">
<input id="search" placeholder="🔍 Suche Regeln, §, Prüfungen, Discord..." oninput="filterRules()">
<button class="admin-btn" onclick="toggleAdmin()">Admin</button>
</div>

<div class="container" id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, getDocs, setDoc, addDoc, doc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "lsmd-prakti-sani.firebaseapp.com",
  projectId: "lsmd-prakti-sani",
  storageBucket: "lsmd-prakti-sani.firebasestorage.app",
  messagingSenderId: "775818506431",
  appId: "DEINE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ADMIN */
const ADMIN_ID = "Karim-Tranquile";
let isAdmin = false;

/* DATA */
let rules = [];

/* LOAD */
async function load(){

const snap = await getDocs(collection(db,"rules"));

rules = [];

snap.forEach(d=>{
rules.push({id:d.id,...d.data()});
});

render();
}

/* RENDER */
function render(){

let html="";

rules.forEach((r,i)=>{

html += `
<div class="section">
<div class="title">${r.section || "Regel"}</div>

<div class="content">

<div class="rule">
${isAdmin ? `<input value="${r.text}" oninput="edit('${r.id}',this.value)">` : `<b>§</b> ${r.text}`}
</div>

</div>
</div>
`;
});

document.getElementById("app").innerHTML = html;
}

/* EDIT LIVE */
window.edit = async function(id,value){

if(!isAdmin) return;

const ref = doc(db,"rules",id);

await setDoc(ref,{
text:value
},{merge:true});

}

/* SEARCH FILTER */
window.filterRules = function(){

let val = document.getElementById("search").value.toLowerCase();
let cards = document.querySelectorAll(".rule");

cards.forEach(c=>{
if(c.innerText.toLowerCase().includes(val)){
c.style.display="flex";
}else{
c.style.display="none";
}
});

}

/* ADMIN MODE */
window.toggleAdmin = function(){
isAdmin = !isAdmin;
alert(isAdmin ? "Admin aktiviert" : "Admin deaktiviert");
render();
}

load();

</script>

</body>
</html>
